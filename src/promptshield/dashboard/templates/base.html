<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}PromptShield Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --ps-bg: #0f1419;
      --ps-card: #1a2332;
      --ps-accent: #3b82f6;
      --ps-green: #22c55e;
      --ps-yellow: #eab308;
      --ps-red: #ef4444;
    }
    body { background: var(--ps-bg); color: #e7ecf3; min-height: 100vh; }
    .navbar { background: #0b1016 !important; border-bottom: 1px solid #243044; }
    .navbar-brand { font-weight: 700; letter-spacing: .02em; }
    .card {
      background: var(--ps-card);
      border: 1px solid #2a3a52;
      border-radius: 12px;
      color: #e7ecf3;
    }
    .card-stat .display-6 { font-weight: 700; }
    .badge-green { background: var(--ps-green); color: #042; }
    .badge-yellow { background: var(--ps-yellow); color: #332; }
    .badge-red { background: var(--ps-red); }
    .table { --bs-table-bg: transparent; --bs-table-color: #e7ecf3; color: #e7ecf3; }
    .table > :not(caption) > * > * { border-color: #2a3a52; }
    a { color: #93c5fd; text-decoration: none; }
    a:hover { color: #bfdbfe; }
    .nav-link.active { color: #fff !important; font-weight: 600; }
    .progress { background: #0f1419; height: 1.25rem; }
    .footer-muted { color: #8b9bb4; font-size: .85rem; }
    .event-type { font-family: ui-monospace, monospace; font-size: .85rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/dashboard{% if dashboard_key %}?key={{ dashboard_key }}{% endif %}">
        🛡️ PromptShield
      </a>
      <div class="navbar-nav">
        {% set q = ('?key=' + dashboard_key) if dashboard_key else '' %}
        <a class="nav-link {% if page == 'home' %}active{% endif %}" href="/dashboard{{ q }}">Overview</a>
        <a class="nav-link {% if page == 'compliance' %}active{% endif %}" href="/dashboard/compliance{{ q }}">Compliance</a>
        <a class="nav-link {% if page == 'analyses' %}active{% endif %}" href="/dashboard/analyses{{ q }}">Analyses</a>
        <a class="nav-link {% if page == 'audit' %}active{% endif %}" href="/dashboard/audit{{ q }}">Audit</a>
        <a class="nav-link" href="/api/v1/dashboard/report?format=html{% if dashboard_key %}&key={{ dashboard_key }}{% endif %}" target="_blank">Export Report</a>
        <a class="nav-link" href="/docs" target="_blank">API Docs</a>
      </div>
      <span class="navbar-text footer-muted ms-auto">v{{ version }} · auto-refresh 30s</span>
    </div>
  </nav>

  <main class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
  </main>

  <script>
    window.PS_DASH_KEY = {{ dashboard_key|tojson }};
    function psHeaders() {
      const h = { 'Accept': 'application/json' };
      if (window.PS_DASH_KEY) h['X-Dashboard-Key'] = window.PS_DASH_KEY;
      return h;
    }
    function psUrl(path) {
      if (!window.PS_DASH_KEY) return path;
      const sep = path.includes('?') ? '&' : '?';
      return path + sep + 'key=' + encodeURIComponent(window.PS_DASH_KEY);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
